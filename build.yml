name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_url:
        description: 'رابط سورس النواة'
        required: true
      boot_url:
        description: 'رابط boot.img الأصلي (اختياري)'
        required: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Build kernel
        run: |
          chmod +x build_kernel.sh
          KERNEL_URL_ENV="${{ github.event.inputs.kernel_url }}" \
          BOOT_URL_ENV="${{ github.event.inputs.boot_url }}" \
          ./build_kernel.sh
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-output
          path: kernel-source/build/
